name: Package

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate repository
        run: python scripts/validate_repository.py

      - name: Check Skill equivalence
        run: python scripts/check_skill_equivalence.py

      - name: Check private content
        run: python scripts/check_private_content.py

      - name: Create release packages
        run: python3 scripts/package_release.py --version 0.1.1 --clean

      - name: Verify packages
        run: |
          test -f dist/autonomous-dev-loop-0.1.1.zip
          test -f dist/autonomous-dev-loop-0.1.1.zip.sha256
          test -f dist/autonomous-dev-loop-codex-0.1.1.zip
          test -f dist/autonomous-dev-loop-codex-0.1.1.zip.sha256
          test -f dist/autonomous-dev-loop-claude-0.1.1.zip
          test -f dist/autonomous-dev-loop-claude-0.1.1.zip.sha256
          test -f dist/autonomous-dev-loop-adapters-0.1.1.zip
          test -f dist/autonomous-dev-loop-adapters-0.1.1.zip.sha256
